# Unbypassable boundary + build gate for the open aatoolkit module. Runs on every
# push and PR once an origin exists. This is the real backstop before anything is
# public; the pre-commit hook only saves a round trip locally.
name: boundary
on:
  push:
  pull_request:
jobs:
  boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Boundary check (no closed imports / no denylisted content)
        run: bash scripts/boundary-check.sh
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
      - name: Build (aatoolkit must stand alone)
        run: go build ./...
      - name: Test
        run: go test ./...
