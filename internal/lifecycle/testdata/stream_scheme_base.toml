[supervisor]
log_dir       = "build/logs"
lock_file     = "build/run/aa-server-status.lock"
grace_period  = "5s"
ready_timeout = "15s"
poll_interval = "500ms"
health_timeout = "2s"

[[server]]
name = "server"
type = "source"
enabled = true
host = "127.0.0.1"
listens = [9730, 9740]
build = "go build -o build/server ./cmd/server"
binary = "build/server"
health = { port = 9730, path = "/healthz" }
